<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Imperativ Multiplayer</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; text-align:center; margin:20px; }
.box { max-width:600px; margin:auto; }
input, button { padding:10px; margin:5px; font-size:16px; }
#sentence { font-size:22px; margin:20px; }
#board { margin-top:20px; text-align:left; }
</style>
</head>

<body>

<div class="box">

<h2>🔥 Imperativ Multiplayer</h2>

<input id="name" placeholder="Dein Name">
<button onclick="start()">Start</button>

<hr>

<div id="game" style="display:none;">

<p id="sentence"></p>

<input id="answer" placeholder="Satz im Imperativ">
<button onclick="check()">Prüfen</button>

<p>Punkte: <span id="score">0</span></p>

<h3>🏆 Rangliste</h3>
<div id="board"></div>

<p id="top"></p>

</div>

</div>

<script>
// 🔥 DEINE FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDJtpb9isQ7FLuvrkvdHsXHJ2qDBvUXI",
  authDomain: "imperativ-trainer.firebaseapp.com",
  databaseURL: "https://imperativ-trainer-default-rtdb.firebaseio.com",
  projectId: "imperativ-trainer",
  storageBucket: "imperativ-trainer.firebasestorage.app",
  messagingSenderId: "1007314946383",
  appId: "1:1007314946383:web:ff2d6a8891a68570e39d3a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name = "";
let score = 0;
let current = {};

const tasks = [
  {q:"Du schreibst den Brief.", a:"Schreib den Brief!"},
  {q:"Ihr lest das Buch.", a:"Lest das Buch!"},
  {q:"Sie öffnen die Tür.", a:"Öffnen Sie die Tür!"},
  {q:"Du gehst nach Hause.", a:"Geh nach Hause!"},
  {q:"Ihr macht die Hausaufgaben.", a:"Macht die Hausaufgaben!"},
  {q:"Sie schließen das Fenster.", a:"Schließen Sie das Fenster!"}
];

function start(){
  name = document.getElementById("name").value.trim();
  if(!name) return alert("Name eingeben!");

  document.getElementById("game").style.display = "block";
  newTask();
}

function newTask(){
  current = tasks[Math.floor(Math.random()*tasks.length)];
  document.getElementById("sentence").innerText = current.q;
}

function check(){
  let ans = document.getElementById("answer").value.trim().toLowerCase();

  if(ans === current.a.toLowerCase()){
    score++;
    document.getElementById("score").innerText = score;

    db.ref("scores/"+name).set(score);

    newTask();
  }

  document.getElementById("answer").value = "";
}

// 🔥 LIVE RANGLISTE
db.ref("scores").on("value", snap=>{
  let data = snap.val() || {};
  let html = "";

  let best = {name:"-", score:0};

  for(let n in data){
    html += `<div>${n}: ${data[n]}</div>`;

    if(data[n] > best.score){
      best = {name:n, score:data[n]};
    }
  }

  document.getElementById("board").innerHTML = html;
  document.getElementById("top").innerText =
    "🥇 Aktuell #1: " + best.name + " (" + best.score + ")";
});
</script>

</body>
</html>
