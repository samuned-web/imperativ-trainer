<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperativ Trainer</title>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    margin:20px;
}

.box{
    max-width:700px;
    margin:auto;
    padding:20px;
    border:2px solid #ccc;
    border-radius:10px;
}

#sentence{
    font-size:24px;
    margin:20px;
}

input{
    width:90%;
    padding:10px;
    font-size:18px;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
}

#result{
    font-weight:bold;
    font-size:20px;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="box">

<h1>Imperativ Trainer</h1>

<p><b>Aktuelle Serie:</b> <span id="streak">0</span></p>
<p><b>Tagesrekord:</b> <span id="record">0</span></p>

<div id="sentence"></div>

<input id="answer" placeholder="Schreibe den Satz im Imperativ">

<br>

<button onclick="checkAnswer()">Prüfen</button>

<div id="result"></div>

</div>

<script>

const tasks = [

{
satz:"Du schreibst den Brief.",
antwort:"Schreib den Brief!"
},

{
satz:"Ihr lest das Buch.",
antwort:"Lest das Buch!"
},

{
satz:"Sie öffnen das Fenster.",
antwort:"Öffnen Sie das Fenster!"
},

{
satz:"Du gehst nach Hause.",
antwort:"Geh nach Hause!"
},

{
satz:"Ihr macht die Hausaufgaben.",
antwort:"Macht die Hausaufgaben!"
},

{
satz:"Sie schließen die Tür.",
antwort:"Schließen Sie die Tür!"
},

{
satz:"Du holst den Ball.",
antwort:"Hol den Ball!"
},

{
satz:"Ihr schreibt die Lösung.",
antwort:"Schreibt die Lösung!"
},

{
satz:"Sie lesen die Zeitung.",
antwort:"Lesen Sie die Zeitung!"
},

{
satz:"Du grüßt deinen Nachbarn.",
antwort:"Grüß deinen Nachbarn!"
}

];

let currentTask;
let streak = 0;
let record = 0;

function normalize(text){

return text
.toLowerCase()
.replaceAll("ß","ss")
.replace(/[.!?,]/g,"")
.replace(/\s+/g," ")
.trim();

}

function newTask(){

currentTask =
tasks[Math.floor(Math.random()*tasks.length)];

document.getElementById("sentence").innerText =
currentTask.satz;

document.getElementById("answer").value="";

}

function checkAnswer(){

const user =
normalize(document.getElementById("answer").value);

const correct =
normalize(currentTask.antwort);

if(user === correct){

streak++;

if(streak > record){
record = streak;
}

document.getElementById("result").innerHTML =
"✅ Richtig";

document.getElementById("result").style.color =
"green";

}else{

document.getElementById("result").innerHTML =
"❌ Falsch<br>Richtig wäre:<br>" +
currentTask.antwort;

document.getElementById("result").style.color =
"red";

streak = 0;
}

document.getElementById("streak").innerText =
streak;

document.getElementById("record").innerText =
record;

setTimeout(newTask,2000);

}

newTask();

</script>

</body>
</html>
