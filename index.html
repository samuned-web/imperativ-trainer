/* ======================
   VARIABLEN
====================== */

let player = "";
let current = null;
let streak = 0;

let shuffled = [];
let index = 0;

let time = 45;
let timer = null;
 let xp = 0;
let level = 1;
/* ======================
   START / LOGIN
====================== */

function startGame(){

    player = document.getElementById("name").value.trim();

    if(!player){
        alert("Name fehlt");
        return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "block";

    updateBoard();
    startRound();
    nextTask();
}

/* ======================
   SHUFFLE
====================== */

function shuffle(arr){
    let a = [...arr];
    for(let i=a.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

/* ======================
   ROUND
====================== */

function startRound(){
    shuffled = shuffle(tasks);
    index = 0;
}

/* ======================
   TIMER
====================== */

function startTimer(){
    clearInterval(timer);
    time = 45;

    document.getElementById("time").innerText = time;

    timer = setInterval(()=>{

        time--;
        document.getElementById("time").innerText = time;

        if(time <= 0){
            clearInterval(timer);
            fail();
        }

    },1000);
}

function fail(){

    streak = 0;

    document.getElementById("result").innerHTML =
        "⏰ Zeit vorbei!<br><b>"+current.a+"</b>";
function addXP(amount){

    xp += amount;

    while(xp >= level * 100){

        xp -= level * 100;
        level++;

        document.getElementById("result").innerHTML =
            "🎉 LEVEL " + level + "!";
    }
}
    updateUI();
    updateBoard();

    setTimeout(nextTask,1200);
}

/* ======================
   NEXT TASK
====================== */

function nextTask(){

    if(index >= shuffled.length){
        startRound();
    }

    current = shuffled[index];
    index++;

    document.getElementById("sentence").innerText = current.q;
    document.getElementById("answer").value = "";
    document.getElementById("answer").focus();

    startTimer();
}

/* ======================
   NORMALIZE
====================== */

function norm(t){
    return t.toLowerCase()
        .replace(/ß/g,"ss")
        .replace(/[.!?,]/g,"")
        .replace(/\s+/g," ")
        .trim();
}

/* ======================
   CHECK
====================== */

function check(){

    clearInterval(timer);

    let user = norm(document.getElementById("answer").value);
    let correct = norm(current.a);

    if(user === correct){

    streak++;

    addXP(10);

    if(time >= 30){
        addXP(5);
    }

    if(streak % 10 === 0){

        const effects = [
            "🎉 Super!",
            "🔥 Stark!",
            "🏆 Klasse!",
            "⭐ Perfekt!",
            "🚀 Mega!"
        ];

        document.getElementById("result").innerHTML =
            effects[Math.floor(Math.random()*effects.length)];
    } else {

        document.getElementById("result").innerHTML =
            "✅ Richtig";
    }
        document.getElementById("result").innerHTML =
            "✅ Richtig";

    }else{

        document.getElementById("result").innerHTML =
            "❌ Falsch<br><b>"+current.a+"</b>";

        saveBest();   // <<< wichtig
        streak = 0;
    }

    updateUI();
    updateBoard();

    setTimeout(nextTask,1200);
}

/* ======================
   UI
====================== */

function updateUI(){

    document.getElementById("streak").innerText = streak;

    const xpElement = document.getElementById("xp");
    if(xpElement){
        xpElement.innerText = xp;
    }

    const levelElement = document.getElementById("level");
    if(levelElement){
        levelElement.innerText = level;
    }
}
}

/* ======================
   BEST SCORE SYSTEM
====================== */

function saveBest(){

    let data =
        JSON.parse(localStorage.getItem("imperativ_best")) || {};

    if(!data[player]){
        data[player] = 0;
    }

    // nur BESTE Serie speichern
    if(streak > data[player]){
        data[player] = streak;
    }

    localStorage.setItem("imperativ_best",JSON.stringify(data));
}

/* ======================
   RANGLISTE
====================== */

function updateBoard(){

    let data =
        JSON.parse(localStorage.getItem("imperativ_best")) || {};

    let sorted =
        Object.entries(data)
        .sort((a,b)=>b[1]-a[1]);

    let html = "";

    for(let [name,score] of sorted){
        html += `<div>${name}: ${score} 🔥</div>`;
    }

    document.getElementById("board").innerHTML =
        html || "Noch keine Spieler";
}

/* ======================
   ENTER
====================== */

document.addEventListener("keydown",e=>{
    if(e.key==="Enter" && document.getElementById("game").style.display!=="none"){
        check();
    }
});
