<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperativ Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  margin-top:20px;
  backdrop-filter: blur(10px);
}

input{
  padding:12px;
  width:80%;
  border:none;
  border-radius:8px;
  margin:10px;
  font-size:16px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin:5px;
}

button:hover{
  background:#009fd4;
}

#sentence{
  font-size:22px;
  margin:15px 0;
}

#result{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

#board{
  text-align:left;
  margin-top:10px;
}

.rank{
  padding:5px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Imperativ Game</h1>

<div class="card">

<input id="name" placeholder="Dein Name eingeben">
<br>
<button onclick="start()">Start</button>

</div>

<div id="game" class="card" style="display:none;">

<div id="sentence">---</div>

<input id="answer" placeholder="Satz im Imperativ">
<br>
<button onclick="check()">Prüfen</button>

<div id="result"></div>

<p>🏆 Punkte: <span id="score">0</span></p>

<h3>Rangliste</h3>
<div id="board"></div>

<p id="top"></p>

</div>

</div>

<script>

// 🔥 Firebase Config (dein Projekt)
const firebaseConfig = {
  apiKey: "AIzaSyDJtpb9isQ7FLuvrkvdHsXHJ2qDBvUXI",
  authDomain: "imperativ-trainer.firebaseapp.com",
  databaseURL: "https://imperativ-trainer-default-rtdb.firebaseio.com",
  projectId: "imperativ-trainer",
  storageBucket: "imperativ-trainer.firebasestorage.app",
  messagingSenderId: "1007314946383",
  appId: "1:1007314946383:web:ff2d6a8891a68570e39d3a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name = "";
let score = 0;
let current = {};
let lastIndex = -1;

// 🧠 Aufgaben
const tasks = [
  {q:"Du schreibst den Brief.", a:"Schreib den Brief!"},
  {q:"Ihr lest das Buch.", a:"Lest das Buch!"},
  {q:"Sie öffnen die Tür.", a:"Öffnen Sie die Tür!"},
  {q:"Du gehst nach Hause.", a:"Geh nach Hause!"},
  {q:"Ihr macht die Hausaufgaben.", a:"Macht die Hausaufgaben!"},
  {q:"Sie schließen das Fenster.", a:"Schließen Sie das Fenster!"},
  {q:"Du holst den Ball.", a:"Hol den Ball!"},
  {q:"Ihr schreibt die Lösung.", a:"Schreibt die Lösung!"}
];

// 👤 Start
function start(){
  name = document.getElementById("name").value.trim();
  if(!name) return alert("Bitte Namen eingeben!");

  document.getElementById("game").style.display = "block";
  newTask();
}

// 🔄 neue Aufgabe
function newTask(){
  let i;
  do{
    i = Math.floor(Math.random()*tasks.length);
  } while(i === lastIndex && tasks.length > 1);

  lastIndex = i;
  current = tasks[i];

  document.getElementById("sentence").innerText = current.q;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
}

// 🧠 Normalisieren
function normalize(t){
  return t.toLowerCase()
    .replaceAll("ß","ss")
    .replace(/[.!?,]/g,"")
    .trim();
}

// ✔️ prüfen
function check(){
  let u = normalize(document.getElementById("answer").value);
  let c = normalize(current.a);

  if(u === c){
    score++;
    document.getElementById("score").innerText = score;

    db.ref("scores/"+name).set(score);

    document.getElementById("result").innerText = "✔ Richtig!";
    document.getElementById("result").style.color = "#00ff88";

    setTimeout(newTask, 800);

  } else {
    score = 0;
    document.getElementById("score").innerText = score;

    db.ref("scores/"+name).set(score);

    document.getElementById("result").innerText = "✘ Falsch → " + current.a;
    document.getElementById("result").style.color = "#ff4d4d";

    setTimeout(newTask, 1200);
  }
}

// 🏆 Rangliste (sortiert)
db.ref("scores").on("value", snap=>{
  let data = snap.val() || {};

  let list = Object.keys(data).map(n=>{
    return {name:n, score:data[n]};
  });

  list.sort((a,b)=>b.score-a.score);

  let html = "";

  list.forEach((p,i)=>{
    html += `<div class="rank">${i+1}. ${p.name} - ${p.score}</div>`;
  });

  document.getElementById("board").innerHTML = html;

  if(list.length>0){
    document.getElementById("top").innerText =
      "🥇 Aktuell #1: " + list[0].name + " (" + list[0].score + ")";
  }
});
</script>

</body>
</html>
