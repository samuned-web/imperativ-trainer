/* ======================
   VARIABLEN
====================== */
let answered = false;
let boardLoaded = false;
let player = "";
let current = null;
let streak = 0;

let shuffled = [];
let index = 0;

let time = 45;
let timer = null;
 let xp = 0;
let level = 1;
/* ======================
   START / LOGIN
====================== */
function loadPlayerData(){

    db.ref("players/" + player)
    .get()
    .then(snapshot=>{

        let data = snapshot.val();

        if(data){

            xp = data.xp || 0;
            level = data.level || 1;
            streak = data.streak || 0;

        }else{

            xp = 0;
            level = 1;
            streak = 0;
        }

        updateUI();
    });
}
function startGame(){

    player = document.getElementById("name").value.trim();

    if(!player){
        alert("Name fehlt");
        return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "block";

    updateBoard();

loadPlayerData();

startRound();
nextTask();
}

/* ======================
   SHUFFLE
====================== */

function shuffle(arr){
    let a = [...arr];
    for(let i=a.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

/* ======================
   ROUND
====================== */

function startRound(){
    shuffled = shuffle(tasks);
    index = 0;
}

/* ======================
   TIMER
====================== */

function startTimer(){
    clearInterval(timer);
    time = 45;

    document.getElementById("time").innerText = time;

    timer = setInterval(()=>{

        time--;
        document.getElementById("time").innerText = time;

        if(time <= 0){
            clearInterval(timer);
            fail();
        }

    },1000);
}

function fail(){

    streak = 0;

    document.getElementById("result").innerHTML =
        "⏰ Zeit vorbei!<br><b>"+current.a+"</b>";

    updateUI();
    savePlayerData();
    updateBoard();

    setTimeout(nextTask,1200);
}

function addXP(amount){

    xp += amount;

    let leveledUp = false;

    while(xp >= level * 100){

        xp -= level * 100;
        level++;

        leveledUp = true;
    }

    if(leveledUp){

        document.getElementById("result").innerHTML =
        `<div style="
        font-size:40px;
        animation:pulse 1s infinite;
        ">
        🎉 LEVEL ${level}!
        </div>`;
    }

    return leveledUp;
}

/* ======================
   NEXT TASK
====================== */

function nextTask(){

    if(index >= shuffled.length){
        startRound();
    }

    current = shuffled[index];
    index++;

    document.getElementById("sentence").innerText = current.q;
    document.getElementById("answer").value = "";
    document.getElementById("answer").focus();

    startTimer();
    answered = false;
}

/* ======================
   NORMALIZE
====================== */

function norm(t){
    return t.toLowerCase()
        .replace(/ß/g,"ss")
        .replace(/[.!?,]/g,"")
        .replace(/\s+/g," ")
        .trim();
}

/* ======================
   CHECK
====================== */

function check(){
    if(answered) return;

    answered = true;

    clearInterval(timer);

    let user = norm(document.getElementById("answer").value);
    let correct = norm(current.a);

    if(user === correct){

    streak++;
    
    saveBest();
        
    addXP(10);

    if(time >= 30){
        addXP(5);
    }

    if(streak % 10 === 0){

        const effects = [
            "🎉 Super!",
            "🔥 Stark!",
            "🏆 Klasse!",
            "⭐ Perfekt!",
            "🚀 Mega!"
        ];

        document.getElementById("result").innerHTML =
            effects[Math.floor(Math.random()*effects.length)];
    } else {

        document.getElementById("result").innerHTML =
            "✅ Richtig";
    }

    }else{

        document.getElementById("result").innerHTML =
            "❌ Falsch<br><b>"+current.a+"</b>";

        saveBest();   // <<< wichtig
        streak = 0;
    }

    updateUI();
    savePlayerData();
    updateBoard();

    setTimeout(nextTask,1200);
}

/* ======================
   UI
====================== */

function updateUI(){

    document.getElementById("streak").innerText =
        streak;

    document.getElementById("level").innerText =
        level;

    document.getElementById("xp").innerText =
        xp;

    let needed = level * 100;

    document.getElementById("xpNeeded").innerText =
        needed;

    let percent = (xp / needed) * 100;

    document.getElementById("xpBar").style.width =
        percent + "%";
}

/* ======================
   BEST SCORE SYSTEM
====================== */

function saveBest(){

    db.ref("scores/" + player)
    .get()
    .then(snapshot=>{

        let best = snapshot.val() || 0;

        if(streak > best){

            db.ref("scores/" + player)
            .set(streak);
        }
    });
}
function savePlayerData(){

    db.ref("players/" + player).set({
        xp: xp,
        level: level,
        streak: streak
    });
}
/* ======================
   RANGLISTE
====================== */

function updateBoard(){

    if(boardLoaded) return;
    boardLoaded = true;

    db.ref("scores").on("value",snapshot=>{

        let data = snapshot.val() || {};

        let sorted =
            Object.entries(data)
            .sort((a,b)=>b[1]-a[1]);

        let html = "";

        let place = 1;

        for(let [name,score] of sorted){

            let medal = "";

            if(place===1) medal="🥇";
            else if(place===2) medal="🥈";
            else if(place===3) medal="🥉";

            html += `
            <div style="
            padding:8px;
            margin:5px;
            background:#334155;
            border-radius:10px;">
            ${medal} #${place}
            ${name}
            - 🔥 ${score}
            </div>
            `;

            place++;
        }

        document.getElementById("board").innerHTML =
            html || "Noch keine Spieler";
    });
}

/* ======================
   ENTER
====================== */

document.addEventListener("keydown",e=>{
    if(e.key==="Enter" && document.getElementById("game").style.display!=="none"){
        check();
    }
});
