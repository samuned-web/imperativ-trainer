<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperativ Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
  text-align:center;
}

.container{ max-width:800px; margin:auto; padding:20px; }

.card{
  background: rgba(255,255,255,0.08);
  padding:20px;
  margin-top:20px;
  border-radius:15px;
  backdrop-filter: blur(8px);
}

input,button{
  padding:12px;
  font-size:16px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{ cursor:pointer; background:#00c6ff; color:white; }

button:hover{ background:#009ed1; }

#sentence{ font-size:24px; margin:15px; }

.rank{ text-align:left; padding:4px; border-bottom:1px solid rgba(255,255,255,0.1); }

#result{ font-weight:bold; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>🔥 Imperativ Game</h1>

<div class="card" id="login">
<input id="name" placeholder="Dein Name">
<button onclick="start()">Start</button>
</div>

<div id="game" style="display:none;" class="card">

<div id="sentence">---</div>

<input id="answer" placeholder="Satz im Imperativ">
<br>
<button onclick="check()">Prüfen</button>

<div id="result"></div>

<p>🏆 Punkte: <span id="score">0</span></p>

<h3>Rangliste</h3>
<div id="board"></div>

<p id="top"></p>

</div>

</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDJtpb9isQ7FLuvrkvdHsXHJ2qDBvUXI",
  authDomain: "imperativ-trainer.firebaseapp.com",
  databaseURL: "https://imperativ-trainer-default-rtdb.firebaseio.com",
  projectId: "imperativ-trainer",
  storageBucket: "imperativ-trainer.firebasestorage.app",
  messagingSenderId: "1007314946383",
  appId: "1:1007314946383:web:ff2d6a8891a68570e39d3a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name = "";
let sessionScore = 0;

let order = [];
let index = 0;

// 🧠 120 Aufgaben (hier komprimiert generiert + erweitert)
const verbs = [
"schreiben","lesen","öffnen","schließen","holen","bringen","geben","nehmen",
"zeigen","erklären","sagen","fragen","antworten","machen","gehen","kommen",
"laufen","sitzen","stehen","warten","arbeiten","zeichnen","bauen","werfen",
"fangen","suchen","finden","verlieren","kaufen","verkaufen"
];

// Aufgaben generieren (120 Stück)
const tasks = [];

const forms = ["du","ihr","Sie"];

function buildTasks(){
  for(let i=0;i<120;i++){
    let v = verbs[Math.floor(Math.random()*verbs.length)];
    let f = forms[Math.floor(Math.random()*3)];

    let q = "";

    if(f==="du") q = "Du " + v + "st den Satz.";
    if(f==="ihr") q = "Ihr " + v + "t den Satz.";
    if(f==="Sie") q = "Sie " + v + "en den Satz.";

    let a = "";

    if(f==="du") a = v.charAt(0).toUpperCase()+v.slice(1)+" den Satz!";
    if(f==="ihr") a = v.charAt(0).toUpperCase()+v.slice(1)+"t den Satz!";
    if(f==="Sie") a = v.charAt(0).toUpperCase()+v.slice(1)+"en den Satz!";

    tasks.push({q,a});
  }
}
buildTasks();

// 🔀 Shuffle (Fisher-Yates)
function shuffle(){
  order = [...Array(tasks.length).keys()];
  for(let i=order.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  index = 0;
}

// 👤 Start
function start(){
  name = document.getElementById("name").value.trim();
  if(!name) return alert("Name eingeben!");

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";

  shuffle();
  newTask();
}

// 🔄 neue Aufgabe
function newTask(){

  if(index >= order.length){
    shuffle(); // 🔁 erst wenn alle durch sind
  }

  current = tasks[order[index]];
  index++;

  document.getElementById("sentence").innerText = current.q;
  document.getElementById("answer").value="";
  document.getElementById("result").innerText="";
}

// 🧠 normalize
function norm(t){
  return t.toLowerCase()
    .replaceAll("ß","ss")
    .replace(/[.!?,]/g,"")
    .trim();
}

// ✔️ check
function check(){
  let u = norm(document.getElementById("answer").value);
  let c = norm(current.a);

  if(u === c){
    sessionScore++;
    document.getElementById("score").innerText=sessionScore;

    db.ref("scores/"+name).once("value",snap=>{
      let old = snap.val()||0;
      if(sessionScore>old){
        db.ref("scores/"+name).set(sessionScore);
      }
    });

    document.getElementById("result").innerText="✔ Richtig!";
    document.getElementById("result").style.color="#00ff88";

    setTimeout(newTask,600);

  } else {
    sessionScore=0;
    document.getElementById("score").innerText=0;

    document.getElementById("result").innerText="✘ Falsch → "+current.a;
    document.getElementById("result").style.color="#ff4d4d";

    setTimeout(newTask,1000);
  }
}

// 🏆 leaderboard
db.ref("scores").on("value",snap=>{
  let data=snap.val()||{};

  let list=Object.keys(data).map(n=>{
    return {name:n,score:data[n]};
  });

  list.sort((a,b)=>b.score-a.score);

  let html="";
  list.forEach((p,i)=>{
    html+=`<div class="rank">${i+1}. ${p.name} - ${p.score}</div>`;
  });

  document.getElementById("board").innerHTML=html;

  if(list.length){
    document.getElementById("top").innerText=
      "🥇 #1: "+list[0].name+" ("+list[0].score+")";
  }
});

</script>

</body>
</html>
