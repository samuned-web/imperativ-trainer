<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperativ Trainer</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 40px;
}

.box {
    max-width: 600px;
    margin: auto;
    padding: 20px;
    border: 2px solid #ccc;
    border-radius: 10px;
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}

#sentence {
    font-size: 22px;
    margin: 20px;
}

#result {
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="box">
    <h1>Imperativ Trainer</h1>

    <p>Übersetze den Satz in den Imperativ.</p>

    <div id="sentence"></div>

    <input type="text" id="answer" placeholder="Deine Antwort">

    <br>

    <button onclick="checkAnswer()">Prüfen</button>
    <button onclick="newTask()">Neue Aufgabe</button>

    <p id="result"></p>
</div>

<script>
const verbs = [
    {inf:"machen", du:"mach", ihr:"macht", sie:"machen Sie"},
    {inf:"gehen", du:"geh", ihr:"geht", sie:"gehen Sie"},
    {inf:"lesen", du:"lies", ihr:"lest", sie:"lesen Sie"},
    {inf:"schreiben", du:"schreib", ihr:"schreibt", sie:"schreiben Sie"},
    {inf:"öffnen", du:"öffne", ihr:"öffnet", sie:"öffnen Sie"},
    {inf:"schließen", du:"schließ", ihr:"schließt", sie:"schließen Sie"},
    {inf:"holen", du:"hol", ihr:"holt", sie:"holen Sie"}
];

let correctAnswer = "";

function newTask() {
    const verb = verbs[Math.floor(Math.random() * verbs.length)];
    const forms = ["du", "ihr", "Sie"];
    const form = forms[Math.floor(Math.random() * forms.length)];

    document.getElementById("sentence").innerText =
        form.toUpperCase() + ": " + verb.inf + " das Buch.";

    if (form === "du") correctAnswer = verb.du;
    else if (form === "ihr") correctAnswer = verb.ihr;
    else correctAnswer = verb.sie;

    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
}

function checkAnswer() {
    const userAnswer =
        document.getElementById("answer").value.trim().toLowerCase();

    if (userAnswer === correctAnswer.toLowerCase()) {
        document.getElementById("result").innerText = "✔ Richtig!";
        document.getElementById("result").style.color = "green";
    } else {
        document.getElementById("result").innerText =
            "✘ Falsch. Richtig wäre: " + correctAnswer;
        document.getElementById("result").style.color = "red";
    }
}

newTask();
</script>

</body>
</html>
