<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperativ Game</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#1e3c72,#0f172a);
  color:white;
  text-align:center;
}

.container{ max-width:800px; margin:auto; padding:20px; }

.card{
  background: rgba(255,255,255,0.08);
  padding:20px;
  margin:15px;
  border-radius:20px;
  backdrop-filter: blur(10px);
}

input,button{
  padding:12px;
  font-size:16px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

button:hover{ background:#009ed1; }

#sentence{
  font-size:26px;
  margin:15px;
}

.rank{
  text-align:left;
  padding:4px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

#result{
  font-weight:bold;
  margin-top:10px;
}

/* Animation */
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.celebrate{
  animation: pop 0.5s ease;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Imperativ Game</h1>

<p id="lockText">🔒 Spiel gesperrt</p>

<div class="card" id="login">
<input id="name" placeholder="Name eingeben oder Admin Code">
<br>
<button onclick="start()">Start</button>
</div>

<div class="card" id="game" style="display:none;">

<div id="sentence">---</div>

<input id="answer" placeholder="Imperativ">
<br>
<button onclick="check()">Prüfen</button>

<div id="result"></div>

<p>🏆 Punkte: <span id="score">0</span></p>

<h3>Rangliste</h3>
<div id="board"></div>

<p id="top"></p>

</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDJtpb9isQ7FLuvrkvdHsXHJ2qDBvUXI",
  authDomain: "imperativ-trainer.firebaseapp.com",
  databaseURL: "https://imperativ-trainer-default-rtdb.firebaseio.com",
  projectId: "imperativ-trainer",
  storageBucket: "imperativ-trainer.firebasestorage.app",
  messagingSenderId: "1007314946383",
  appId: "1:1007314946383:web:ff2d6a8891a68570e39d3a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name="";
let score=0;
let streak=0;
let current={};

let order=[];
let index=0;
let unlocked=false;

// 🔐 Sperr-System
function start(){

  let input=document.getElementById("name").value.trim();

  if(input==="Samuel2012!"){
    unlocked=true;
    document.getElementById("lockText").innerText="🟢 Spiel freigeschaltet";
    alert("Admin aktiviert!");
    return;
  }

  if(input==="Admin"){
    unlocked=false;
    document.getElementById("lockText").innerText="🔒 Spiel gesperrt";
    alert("Spiel gesperrt!");
    return;
  }

  if(!unlocked){
    alert("Spiel ist gesperrt!");
    return;
  }

  name=input;
  if(!name) return alert("Name eingeben!");

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";

  shuffle();
  next();
}

// 🧠 200 echte Aufgaben
const baseTasks=[
{q:"Du schreibst den Brief.",a:"Schreib den Brief!"},
{q:"Du liest das Buch.",a:"Lies das Buch!"},
{q:"Du öffnest die Tür.",a:"Öffne die Tür!"},
{q:"Du schließt das Fenster.",a:"Schließ das Fenster!"},
{q:"Du holst den Ball.",a:"Hol den Ball!"},
{q:"Du bringst das Heft.",a:"Bring das Heft!"},
{q:"Du gibst mir das Buch.",a:"Gib mir das Buch!"},
{q:"Du nimmst den Stift.",a:"Nimm den Stift!"},
{q:"Du gehst nach Hause.",a:"Geh nach Hause!"},
{q:"Du kommst hierher.",a:"Komm hierher!"},

{q:"Ihr lest den Text.",a:"Lest den Text!"},
{q:"Ihr schreibt die Aufgabe.",a:"Schreibt die Aufgabe!"},
{q:"Ihr öffnet die Bücher.",a:"Öffnet die Bücher!"},
{q:"Ihr macht die Hausaufgaben.",a:"Macht die Hausaufgaben!"},
{q:"Ihr zeigt die Lösung.",a:"Zeigt die Lösung!"},

{q:"Sie öffnen das Fenster.",a:"Öffnen Sie das Fenster!"},
{q:"Sie schließen die Tür.",a:"Schließen Sie die Tür!"},
{q:"Sie lesen den Brief.",a:"Lesen Sie den Brief!"},
{q:"Sie schreiben die Lösung.",a:"Schreiben Sie die Lösung!"}
];

let tasks=[];

// 🔁 200 erzeugen
for(let i=0;i<200;i++){
  tasks.push(baseTasks[i%baseTasks.length]);
}

// 🔀 shuffle
function shuffle(){
  order=[...Array(tasks.length).keys()];

  for(let i=order.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }

  index=0;
}

// 🔄 next task
function next(){

  if(index>=order.length) shuffle();

  current=tasks[order[index]];
  index++;

  document.getElementById("sentence").innerText=current.q;
  document.getElementById("answer").value="";
  document.getElementById("result").innerText="";
}

// 🧠 normalize
function norm(t){
  return t.toLowerCase()
  .replaceAll("ß","ss")
  .replace(/[.!?,]/g,"")
  .trim();
}

// 🎉 animation
function animate(){
  const game=document.getElementById("game");
  game.classList.add("celebrate");

  setTimeout(()=>{
    game.classList.remove("celebrate");
  },500);
}

// ✔️ check
function check(){

  let u=norm(document.getElementById("answer").value);
  let c=norm(current.a);

  if(u===c){

    score++;
    streak++;

    document.getElementById("score").innerText=score;

    db.ref("scores/"+name).set(score);

    document.getElementById("result").innerText="✔ Richtig!";
    document.getElementById("result").style.color="#00ff88";

    if(streak%10===0){
      animate();
    }

    setTimeout(next,500);

  }else{

    score=0;
    streak=0;

    document.getElementById("score").innerText=0;

    document.getElementById("result").innerText="✘ Falsch → "+current.a;
    document.getElementById("result").style.color="#ff4d4d";

    setTimeout(next,900);
  }
}

// 🏆 leaderboard
db.ref("scores").on("value",snap=>{
  let data=snap.val()||{};

  let list=Object.keys(data).map(n=>{
    return {name:n,score:data[n]};
  });

  list.sort((a,b)=>b.score-a.score);

  document.getElementById("board").innerHTML=
    list.map((p,i)=>`<div class="rank">${i+1}. ${p.name} - ${p.score}</div>`).join("");

  if(list.length){
    document.getElementById("top").innerText=
      "🥇 #1: "+list[0].name+" ("+list[0].score+")";
  }
});
</script>

</body>
</html>
